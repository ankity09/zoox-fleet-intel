function deSelectTable(tableName) {
  document.querySelectorAll('.de-table-list li').forEach(li => li.classList.remove('active'));
  const active = document.querySelector(`.de-table-list li[data-table="${tableName}"]`);
  if (active) active.classList.add('active');

  const content = document.getElementById('de-content');
  if (!content) return;

  if (_deAbort) { _deAbort.abort(); _deAbort = null; }

  const cached = _deCache[tableName];
  if (cached && cached.columns && cached.columns.length) {
    content.innerHTML = _deRenderCards(tableName, cached.columns, cached.rows, cached.row_count, !cached.rows, cached.queryMs);
  } else {
    content.innerHTML = `<div class="de-loading"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg> Loading...</div>`;
  }

  const ctrl = new AbortController();
  _deAbort = ctrl;
  const t0 = performance.now();
  fetch(`/api/architecture/table-data?table=${encodeURIComponent(tableName)}&source=${_deSource}&limit=20`, { signal: ctrl.signal })
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .then(data => {
      if (ctrl.signal.aborted) return;
      const queryMs = performance.now() - t0;
      _deCache[tableName] = { columns: data.columns, rows: data.rows, row_count: data.row_count, queryMs };
      const stillActive = document.querySelector('.de-table-list li.active');
      if (stillActive && stillActive.dataset.table === tableName) {
        content.innerHTML = _deRenderCards(tableName, data.columns, data.rows, data.row_count, false, queryMs);
      }
    })
    .catch(e => {
      if (e.name === 'AbortError') return;
      if (ctrl.signal.aborted) return;
      if (cached && cached.columns && cached.columns.length) {
        content.innerHTML = _deRenderCards(tableName, cached.columns, null, cached.row_count, false, cached.queryMs);
      } else {
        content.innerHTML = `<div class="de-empty-state">Failed to load table data</div>`;
      }
    });
}

function _deRenderCards(tableName, columns, rows, rowCount, loading, queryMs) {
  let html = '';
  const countLabel = typeof rowCount === 'number' ? `${rowCount.toLocaleString()} rows` : '';
  const timerBadge = queryMs ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#f59e0b;margin-left:8px" title="Query execution time">&#9889; ${queryMs.toFixed(1)}ms</span>` : '';
  // Sample data card
  html += `<div class="de-card">
    <div class="de-card-header"><span>Sample Data &middot; ${escHtml(tableName.replace(/_/g, ' '))}</span><span style="font-weight:400;text-transform:none;letter-spacing:0">${rows ? rows.length + ' rows' : ''}${timerBadge}</span></div>
    <div class="de-card-body">${loading
      ? '<div class="de-loading"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.49-8.49l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg> Loading sample data...</div>'
      : rows ? _deRenderSampleTable(columns, rows) : '<div class="de-empty-state">No sample data available</div>'
    }</div>
  </div>`;
  // Schema card
  html += `<div class="de-card">
    <div class="de-card-header"><span>Schema &middot; ${escHtml(tableName.replace(/_/g, ' '))}</span><span style="font-weight:400;text-transform:none;letter-spacing:0">${countLabel}</span></div>
    <div class="de-card-body">${_deRenderSchemaTable(columns)}</div>
  </div>`;
  return html;
}

function _deRenderSchemaTable(columns) {
  if (!columns || !columns.length) return '<div class="de-empty-state">No schema available</div>';
  const hasExtended = columns.some(c => c.nullable !== undefined || c.key);
  let head = '<tr><th>Column</th><th>Type</th>';
  if (hasExtended) head += '<th>Nullable</th><th>Default</th><th>Key</th>';
  head += '</tr>';
  const rows = columns.map(c => {
    let row = `<tr><td style="font-weight:500">${escHtml(c.col)}</td><td><span class="de-badge-type">${escHtml(c.type)}</span></td>`;
    if (hasExtended) {
      row += `<td>${c.nullable ? '<span class="de-badge-nullable">NULL</span>' : 'NOT NULL'}</td>`;
      row += `<td style="font-size:11px;color:var(--text-muted)">${c.default ? escHtml(String(c.default).substring(0, 30)) : '\u2014'}</td>`;
      row += `<td>${c.key ? '<span class="de-badge-pk">' + escHtml(c.key) + '</span>' : ''}</td>`;
    }
    row += '</tr>';
    return row;
  }).join('');
  return `<table>${head}${rows}</table>`;
}

function _deRenderSampleTable(columns, rows) {
  if (!rows || !rows.length) return '<div class="de-empty-state">No data</div>';
  const colNames = columns.map(c => c.col);
  const head = '<tr>' + colNames.map(c => `<th>${escHtml(c)}</th>`).join('') + '</tr>';
  const body = rows.map(r => {
    return '<tr>' + colNames.map(c => {
      const v = r[c];
      if (v === null || v === undefined) return `<td><span class="de-null-cell">null</span></td>`;
      let s = typeof v === 'object' ? JSON.stringify(v) : String(v);
      if (s.length > 100) s = s.substring(0, 100) + '\u2026';
      return `<td title="${escHtml(String(r[c]))}">${escHtml(s)}</td>`;
    }).join('') + '</tr>';
  }).join('');
  return `<table>${head}${body}</table>`;
}

function showFlowDetail(info, wUrl) {
  if (info.key === 'lakehouse' || info.key === 'lakebase' || info.key === 'data_generation' || info.key === 'lakebase_setup') {
    renderDataExplorer(info, wUrl);
    return;
  }
  const panel = document.getElementById('flow-detail-panel');
  const status = info.status || 'online';
  const color = info.color || '#6366f1';
  const icon = FLOW_ICONS[info.type] || FLOW_ICONS['mcp-server'];
  const details = info.details || {};
  const stats = info.stats || [];
  const displayItems = info.display_items || [];

  // Workspace link
  let configUrl = info.workspace_url || '';
  if (!configUrl) {
    if (info.key === 'mas' && wUrl && details.tile_id) {
      configUrl = `${wUrl}/ml/bricks/mas/configure/${details.tile_id}`;
    } else if (info.type === 'genie-space' && wUrl && details.genie_space_id) {
      configUrl = `${wUrl}/genie/rooms/${details.genie_space_id}`;
    }
  }

  // Build sections array — each section is {title, html, wide?}
  const sections = [];

  // Description (always full width)
  const desc = info.description || details.genie_description || details.ka_description || '';
  if (desc) {
    sections.push({title: 'Description', html: `<p style="font-size:13px;color:var(--text);line-height:1.6;margin:0">${escHtml(desc)}</p>`, wide: true});
  }

  // Stats
  const statsHtml = stats.map(s =>
    `<span class="flow-detail-stat">${fmt(s.value)} ${escHtml(s.label)}</span>`
  ).join('');
  if (statsHtml) {
    sections.push({title: 'Stats', html: `<div class="flow-detail-stats">${statsHtml}</div>`});
  }

  // Display items (component list)
  const filteredItems = displayItems.filter(it => it.text);
  if (filteredItems.length) {
    const itemsHtml = filteredItems.map(it =>
      `<div style="font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:6px;height:6px;border-radius:50%;background:${it.status === 'success' ? '#16a34a' : it.status === 'info' ? '#3b82f6' : '#9ca3af'};flex-shrink:0"></span>
        ${escHtml(it.text)}
      </div>`
    ).join('');
    sections.push({title: 'Components', html: itemsHtml});
  }

  // Genie Space — connected tables and curated questions
  const genieTables = details.genie_tables || [];
  const curatedQ = details.curated_question || '';
  if (genieTables.length) {
    let html = `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${genieTables.map(t =>
      `<span style="font-size:11px;background:var(--steel-bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--text)">${escHtml(typeof t === 'string' ? t : '')}</span>`
    ).join('')}</div>`;
    if (curatedQ) {
      html += `<div style="font-size:11px;color:var(--text-muted);font-style:italic;margin-top:4px">Sample: "${escHtml(curatedQ)}"</div>`;
    }
    sections.push({title: `Connected Tables (${genieTables.length})`, html});
  }

  // KA details — indexes and endpoint state
  const kaIndexes = details.ka_indexes || [];
  const kaEndpoint = details.ka_endpoint || details.endpoint_name || '';
  const kaState = details.endpoint_state || '';
  if (kaIndexes.length || kaEndpoint || kaState) {
    let html = '';
    if (kaState) {
      html += `<div style="font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:6px">
        <span style="width:6px;height:6px;border-radius:50%;background:${kaState === 'READY' ? '#16a34a' : '#f59e0b'}"></span>
        Endpoint: ${escHtml(kaEndpoint || 'N/A')} — ${escHtml(kaState)}
      </div>`;
    }
    if (kaIndexes.length) {
      html += `<div style="font-size:12px;font-weight:600;margin-bottom:4px">Vector Search Indexes (${kaIndexes.length})</div>`;
      html += kaIndexes.map(idx =>
        `<div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;padding-left:8px">• ${escHtml(idx)}</div>`
      ).join('');
    }
    sections.push({title: 'Knowledge Assistant', html});
  }

  // MAS sub-agents
  const subAgents = details.sub_agent_names || [];
  if (subAgents.length) {
    const html = subAgents.map(a =>
      `<div style="font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:6px;height:6px;border-radius:50%;background:#3b82f6;flex-shrink:0"></span>
        ${escHtml(a)}
      </div>`
    ).join('');
    sections.push({title: 'Sub-Agents', html});
  }

  // MAS instructions (truncated)
  const masInstructions = details.instructions || '';
  if (masInstructions) {
    const truncated = masInstructions.length > 200 ? masInstructions.substring(0, 200) + '...' : masInstructions;
    sections.push({title: 'System Instructions', html: `<p style="font-size:11px;color:var(--text-muted);line-height:1.5;margin:0;font-style:italic">${escHtml(truncated)}</p>`});
  }

  // UC Function details
  const fnDetails = details.function_details || {};
  const fnEntries = Object.entries(fnDetails);
  if (fnEntries.length) {
    const html = fnEntries.map(([fn, info]) => {
      const infoEntries = Object.entries(info || {}).filter(([k]) => k !== 'function_name').slice(0, 4);
      return `<div style="margin-bottom:6px"><div style="font-size:12px;font-weight:600">${escHtml(fn)}</div>` +
        infoEntries.map(([k, v]) => `<div style="font-size:11px;color:var(--text-muted)">${escHtml(k)}: ${escHtml(String(v).substring(0, 80))}</div>`).join('') +
        `</div>`;
    }).join('');
    sections.push({title: 'Functions', html});
  }

  // Table schemas
  const tableSchemas = details.table_schemas || {};
  const schemaEntries = Object.entries(tableSchemas);
  if (schemaEntries.length) {
    const html = schemaEntries.slice(0, 6).map(([tbl, cols]) => {
      const colList = (cols || []).slice(0, 8);
      const moreCount = (cols || []).length - 8;
      return `<div style="margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;margin-bottom:3px">${escHtml(tbl)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${colList.map(c =>
          `<span style="font-size:10px;background:var(--steel-bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--text-muted)">${escHtml(c.col)} <span style="color:#9ca3af">${escHtml(c.type)}</span></span>`
        ).join('')}${moreCount > 0 ? `<span style="font-size:10px;color:var(--text-muted)">+${moreCount} more</span>` : ''}</div>
      </div>`;
    }).join('');
    sections.push({title: `Table Schemas (${schemaEntries.length})`, html, wide: true});
  }

  // Tables list (fallback when no schemas)
  const tables = details.tables || [];
  if (tables.length && !schemaEntries.length) {
    const html = `<div class="flow-detail-tables">${tables.map(t =>
      `<span class="flow-detail-table-pill">${escHtml(typeof t === 'string' ? t.replace(/_/g, ' ') : t)}</span>`
    ).join('')}</div>`;
    sections.push({title: 'Tables', html});
  }

  // Functions list (fallback for UC node without detailed info)
  const functions = details.functions || [];
  if (functions.length && !fnEntries.length) {
    const html = `<div style="display:flex;flex-wrap:wrap;gap:4px">${functions.map(f =>
      `<span style="font-size:11px;background:var(--steel-bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px">${escHtml(f)}</span>`
    ).join('')}</div>`;
    sections.push({title: 'Functions', html});
  }

  // Build the grid content
  const wideSections = sections.filter(s => s.wide);
  const normalSections = sections.filter(s => !s.wide);

  const wideHtml = wideSections.map(s =>
    `<div class="flow-detail-section" style="grid-column:1/-1">${s.title ? `<h4>${escHtml(s.title)}</h4>` : ''}${s.html}</div>`
  ).join('');

  const normalHtml = normalSections.map(s =>
    `<div class="flow-detail-section">${s.title ? `<h4>${escHtml(s.title)}</h4>` : ''}${s.html}</div>`
  ).join('');

  panel.innerHTML = `
    <div class="flow-detail-header ${status}">
      <div class="flow-detail-header-left">
        <div class="flow-detail-icon" style="background:${color}15;color:${color}">${icon}</div>
        <span class="flow-detail-name">${escHtml(info.name || '')}</span>
        <span class="flow-detail-badge ${status}">${FLOW_STATUS_ICON[status] || ''} ${status === 'online' ? 'ONLINE' : 'ERROR'}</span>
      </div>
      <div class="flow-detail-header-right">
        ${configUrl ? `<a href="${escHtml(configUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open in Workspace
        </a>` : ''}
        <button class="flow-detail-close" onclick="event.stopPropagation();hideFlowDetail()">&times;</button>
      </div>
    </div>
    <div class="flow-detail-body">
      <div class="flow-detail-right">
        ${wideHtml}
        ${normalHtml}
      </div>
    </div>`;
  panel.classList.add('open');
}

// ─── Sparkline Utility ───────────────────────────────────────────────────
function drawSparkline(canvas, data, color) {
  if (!canvas || !data || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth || 120;
  const h = canvas.height = canvas.offsetHeight || 28;
  ctx.clearRect(0, 0, w, h);
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  ctx.beginPath();
  ctx.strokeStyle = color || 'var(--accent)';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  data.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ─── Dashboard Loader ────────────────────────────────────────────────────
async function loadDashboard() {
  // Greeting
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('dash-greeting-text').textContent = greeting;
  document.getElementById('dash-greeting-sub').textContent = 'Loading operational summary...';

  showSkeleton('dash-kpis', 2);
  showSkeleton('dash-exceptions', 3);
  showSkeleton('dash-activity', 3);
  document.getElementById('dash-briefing').innerHTML = '<div class="loading">Loading briefing...</div>';

  try {
    // Gotcha #46: Every fetchApi in Promise.all needs .catch() so one failure doesn't break the dashboard
    const [overview, exceptions] = await Promise.all([
      fetchApi('/api/agent-overview').catch(() => ({kpis: {}, workflows: [], agent_actions_recent: []})),
      fetchApi('/api/exceptions?status=open&limit=20').catch(() => []),
    ]);

    const k = overview.kpis || {};

    // KPIs
    document.getElementById('dash-kpis').innerHTML = `
      <div class="kpi-card red">
        <div class="kpi-label">Open Exceptions</div>
        <div class="kpi-value">${fmt(k.open_exceptions || 0)}</div>
        <div class="kpi-sub">Needs attention</div>
        <canvas class="kpi-sparkline" id="spark-exc" style="width:100%;height:28px"></canvas>
      </div>
      <div class="kpi-card accent">
        <div class="kpi-label">Pending Approval</div>
        <div class="kpi-value">${fmt(k.pending_approval || 0)}</div>
        <div class="kpi-sub">Agent workflows</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Completed (7d)</div>
        <div class="kpi-value">${fmt(k.completed_7d || 0)}</div>
        <div class="kpi-sub">Approved workflows</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Agent Actions (24h)</div>
        <div class="kpi-value">${fmt(k.agent_actions_24h || 0)}</div>
        <div class="kpi-sub">Autonomous actions</div>
      </div>
    `;
    animateKPIs('dash-kpis');
    updateAgentBadge(k.pending_approval || 0);

    // Sparkline placeholder data (replace with real trend data if available)
    setTimeout(() => {
      const sparkCanvas = document.getElementById('spark-exc');
      if (sparkCanvas) {
        // TODO(vibe): Replace with real trend data from API
        const trend = Array.from({length: 7}, () => Math.floor(Math.random() * 10) + (k.open_exceptions || 3));
        drawSparkline(sparkCanvas, trend, '#ef4444');
      }
    }, 200);

    // Exceptions
    renderDashExceptions(exceptions);

    // Recent activity
    const actions = overview.agent_actions_recent || [];
    renderDashActivity(actions);

    // Greeting update
    const excCount = k.open_exceptions || 0;
    const pendingWf = k.pending_approval || 0;
    const parts = [];
    if (excCount > 0) parts.push(`${excCount} open exception${excCount > 1 ? 's' : ''}`);
    if (pendingWf > 0) parts.push(`${pendingWf} pending workflow${pendingWf > 1 ? 's' : ''}`);
    document.getElementById('dash-greeting-sub').textContent = parts.length
      ? `You have ${parts.join(' and ')} needing attention.`
      : 'All systems operational — no items need attention.';

  } catch(e) {
    console.error('Dashboard load error:', e);
    document.getElementById('dash-kpis').innerHTML = '<div class="loading">Failed to load dashboard data.</div>';
  }

  // Load briefing (async, non-blocking)
  loadBriefing();
}

// ─── Exception Cards ─────────────────────────────────────────────────────
function renderDashExceptions(exceptions) {
  const container = document.getElementById('dash-exceptions');
  const countBadge = document.getElementById('dash-exc-count');
  if (countBadge) countBadge.textContent = exceptions.length;

  if (!exceptions.length) {
    container.innerHTML = '<div class="loading" style="padding:16px">No open exceptions — all clear.</div>';
    return;
  }

  container.innerHTML = exceptions.map(exc => {
    const truncDesc = (exc.description || '').length > 120 ? exc.description.substring(0, 120) + '...' : exc.description;
    return `
      <div class="exc-card exc-${exc.severity || 'medium'}">
        <div class="exc-top">
          <span class="exc-title">${escHtml(exc.exception_type || 'Exception')}</span>
          ${severityBadge(exc.severity || 'medium')}
          ${statusBadge(exc.status || 'open')}
        </div>
        <div class="exc-desc">${escHtml(truncDesc || '')}</div>
        <div class="exc-meta">${escHtml(exc.entity_type || '')} ${escHtml(exc.entity_id || '')} &middot; ${timeAgo(exc.created_at)}</div>
        <div class="exc-actions">
          <button class="btn btn-sm btn-primary" onclick="handleException(${exc.exception_id},'acknowledged')">Acknowledge</button>
          <button class="btn btn-sm btn-green" onclick="promptResolveException(${exc.exception_id})">Resolve</button>
          <button class="btn btn-sm btn-steel" onclick="handleException(${exc.exception_id},'escalated')">Escalate</button>
        </div>
      </div>`;
  }).join('');
}

async function handleException(id, status, resolution) {
  try {
    const body = {status};
    if (resolution) body.resolution = resolution;
    await patchApi('/api/exceptions/' + id, body);
    showFlash(`Exception ${status}`);
    if (currentPage === 'dashboard') loadDashboard();
  } catch(e) { showFlash('Failed to update exception', true); }
}

function promptResolveException(id) {
  const resolution = prompt('Enter resolution notes:');
  if (resolution !== null) handleException(id, 'resolved', resolution);
}

async function loadBriefingStream() {
  const container = document.getElementById('dash-briefing');
  container.innerHTML = '<div class="loading">Generating briefing...</div>';
  try {
    const resp = await fetch('/api/briefing/stream');
    if (!resp.ok) throw new Error('Stream failed');
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', text = '';
    container.innerHTML = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') continue;
        try {
          const evt = JSON.parse(raw);
          if (evt.type === 'delta') {
            text += evt.text;
            container.innerHTML = formatMd(text);
          }
        } catch(_) {}
      }
    }
    if (!text) container.innerHTML = '<div class="loading">No briefing content.</div>';
  } catch(e) {
    container.innerHTML = '<div class="loading">Streaming briefing failed.</div>';
    loadBriefing();  // fallback to non-streaming
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   WORKFLOW ENRICHMENT — Reasoning chain + enriched summary in modal
   ═══════════════════════════════════════════════════════════════════════════ */

function renderReasoningChain(chain) {
  if (!chain || !Array.isArray(chain) || !chain.length) return '';
  const TOOL_ICONS = {
    monitor: '\u{1F50D}', analyze: '\u{1F4CA}', action: '\u26A1',
    query: '\u{1F4C4}', write: '\u270F\uFE0F', approve: '\u2705',
    // TODO(vibe): Add your tool icons here
  };
  const steps = chain.map((s, i) => {
    const icon = TOOL_ICONS[s.tool] || '\u25CF';
    const status = s.status || 'completed';
    const output = s.output || '';
    return `
      <div class="rc-step">
        <div class="rc-icon ${status}">${status === 'completed' ? '\u2714' : status === 'active' ? '\u25B6' : '\u25CB'}</div>
        <div class="rc-body">
          <div class="rc-label">${icon} ${escHtml(s.label || 'Step ' + (i+1))}</div>
          ${output ? `<div class="rc-output collapsed" onclick="this.classList.toggle('collapsed');this.classList.toggle('expanded')">${escHtml(output)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  return `<div style="margin-top:16px"><label style="font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:.5px;font-weight:700">Reasoning Chain</label><div class="rc-chain">${steps}</div></div>`;
}

   INIT
   ═══════════════════════════════════════════════════════════════════════════ */
try { lucide.createIcons(); } catch(e) { console.warn('Lucide not loaded:', e); }
loadDashboard();
