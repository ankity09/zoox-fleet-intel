command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "f040ec9783cb05b2"
  - name: CATALOG
    value: "main"
  - name: SCHEMA
    value: "zoox_fleet_intel"
  - name: MAS_TILE_ID
    value: "286b1365"
  - name: GENIE_SPACE_ID
    value: "01f11860b6ff18d7b9e72bfcea1fcbbb"
  - name: KA_TILE_ID
    value: ""
  - name: DEMO_NAME
    value: "Zoox Fleet Intelligence Platform"
  - name: DEMO_CUSTOMER
    value: "Zoox"
  - name: PGHOST
    value: "ep-orange-violet-d28oim02.database.us-east-1.cloud.databricks.com"
  - name: PGDATABASE
    value: "databricks_postgres"
  - name: PGUSER
    value: "f57b1ea6-5a6d-4d71-92cf-c68f26ccf51c"
  - name: PGSSLMODE
    value: "require"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "f040ec9783cb05b2"
      permission: CAN_USE
  - name: mas-endpoint
    serving_endpoint:
      name: "mas-286b1365-endpoint"
      permission: CAN_QUERY
