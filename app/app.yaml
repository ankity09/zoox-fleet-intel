command:
  - uvicorn
  - backend.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: "55d3a94c50a43f96"
  - name: CATALOG
    value: "serverless_simplot_v1_catalog"
  - name: SCHEMA
    value: "zoox_fleet_intel"
  - name: MAS_TILE_ID
    value: "4d16197c"
  - name: GENIE_SPACE_ID
    value: "01f1135a9ef212b08959b5eb60aca896"
  - name: KA_TILE_ID
    value: ""
  - name: DEMO_NAME
    value: "Zoox Fleet Intelligence Platform"
  - name: DEMO_CUSTOMER
    value: "Zoox"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "55d3a94c50a43f96"
      permission: CAN_USE
  - name: mas-endpoint
    serving_endpoint:
      name: "mas-4d16197c-endpoint"
      permission: CAN_QUERY
  - name: database
    database:
      instance_name: "ai-builder"
      database_name: "zoox_fleet_intel"
      permission: CAN_CONNECT_AND_CREATE
