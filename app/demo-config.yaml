# Phase 3: Data Model
data_model:
  entities:
    - name: "vehicles"
      description: "Robotaxi fleet — vehicle ID, status, current zone, battery %, city"
      layer: "delta"
    - name: "rides"
      description: "Historical ride records — pickup/dropoff zone, timestamps, wait time, fare"
      layer: "delta"
    - name: "events"
      description: "Venue events — Sphere shows, Knights games, conventions, expected attendance"
      layer: "delta"
    - name: "zones"
      description: "Service area zones per city — geo boundaries, demand capacity"
      layer: "delta"
    - name: "demand_forecasts"
      description: "ML-generated demand predictions per zone per hour"
      layer: "delta"
    - name: "fleet_actions"
      description: "Rebalancing commands — move N vehicles from zone A to zone B"
      layer: "lakebase"
    - name: "surge_alerts"
      description: "Demand surge alerts for ops managers to review"
      layer: "lakebase"
    - name: "dispatch_overrides"
      description: "Manual dispatch override records from ops managers"
      layer: "lakebase"
  kpis:
    - name: "Fleet Utilization %"
      description: "Percentage of vehicles actively serving rides vs idle/charging"
    - name: "Avg Rider Wait Time"
      description: "Minutes from ride request to pickup across all zones"
    - name: "Rides Per Vehicle/Day"
      description: "Average rides completed per robotaxi per day"
    - name: "Empty Mile Ratio"
      description: "Percentage of miles driven without a passenger (deadheading)"
  historical_range: "6 months (Aug 2025 - Jan 2026)"
  lakebase_tables:
    - "fleet_actions"
    - "surge_alerts"
    - "dispatch_overrides"
    - "notes"
    - "agent_actions"
    - "workflows"

# Phase 4: AI Layer
ai_layer:
  genie_tables:
    - "vehicles"
    - "rides"
    - "events"
    - "zones"
    - "demand_forecasts"
  mas_persona: |
    You are Zoox Fleet Intelligence, an AI operations assistant for Zoox's autonomous ride-hail
    fleet. You help fleet ops managers predict demand surges around Sphere shows, Golden Knights
    games, and Vegas conventions. You recommend optimal vehicle repositioning to minimize empty
    miles and rider wait times. You track fleet utilization, rides per vehicle, and the transition
    from free rides to paid commercial service across Las Vegas and San Francisco.
  sub_agents:
    - type: "genie-space"
      name: "zoox-fleet-data"
      description: "Query fleet operations data — vehicles, rides, events, zones, demand forecasts"
    - type: "external-mcp-server"
      name: "mcp-lakebase-connection"
      description: "Write operational data to Lakebase — fleet actions, surge alerts, dispatch overrides, notes"
    - type: "knowledge-assistant"
      name: "fleet-ops-sops"
      description: "Fleet operations SOPs — dispatch procedures, rebalancing protocols, surge response, incident handling"
    - type: "unity-catalog-function"
      name: "predict_demand"
      description: "Predict ride demand for a zone + time window. Returns demand score and confidence."
    - type: "unity-catalog-function"
      name: "optimize_rebalancing"
      description: "Given current fleet positions and demand forecast, compute optimal vehicle repositioning moves."
  deploy_lakebase_mcp: true
  genie_space_id: "01f1135a9ef212b08959b5eb60aca896"
  mas_tile_id: "4d16197c"
  mas_full_tile_id: "4d16197c-7362-4bbb-92bd-dd5011bfba8c"
  mcp_connection_name: "zoox-fleet-lakebase-mcp"
  lakebase_instance: "ai-builder"
  lakebase_database: "zoox_fleet_intel"
