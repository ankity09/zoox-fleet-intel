# Phase 1: Customer Discovery & Story
story:
  customer_name: "Zoox"
  demo_name: "Zoox Fleet Intelligence Platform"
  website: "https://zoox.com"
  industry: "Autonomous Vehicles"
  sub_vertical: "Ride-Hailing / Mobility"
  scale: "~4,200 employees, ~50 robotaxis (scaling to 5,000), 2 active cities, factory targeting 10K/year"
  customer_context: |
    Zoox has official partnerships with The Sphere (Oct 2025) and T-Mobile Arena (Dec 2025) in
    Las Vegas as their Official Autonomous Ride-Hail Partner. These venues generate massive
    event-driven demand surges — The Sphere draws millions of visitors annually, T-Mobile Arena
